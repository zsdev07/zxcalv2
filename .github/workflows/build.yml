name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Matches modern WebView requirements
          channel: 'stable'

      - name: Re-create Android files
        run: |
          rm -rf android
          flutter create . --platforms android --project-name zx_calculator

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        # We use --split-per-abi to make the files smaller for your phone
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zx-calculator-apk
          path: build/app/outputs/flutter-apk/app-release.apk
